kind = "web"
previewPath = "/"
title = "AI Chatbot & Interview Copilot"
version = "1.0.0"
id = "artifacts/copilot-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23784

[services.development]
run = "pnpm --filter @workspace/copilot-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/copilot-web", "run", "build" ]
publicDir = "artifacts/copilot-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23784"
BASE_PATH = "/"
